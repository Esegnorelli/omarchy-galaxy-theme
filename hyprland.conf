# Eye of God — Helix Nebula theme (stable .conf; rotating border via borderangle)
$activeBorder = rgb(3fc7dd) rgb(6fe0ee) rgb(e6b15a) rgb(3fc7dd) 45deg
$inactiveBorder = rgba(5a6e6c55)
general {
    col.active_border = $activeBorder
    col.inactive_border = $inactiveBorder
    border_size = 2
    gaps_in = 6
    gaps_out = 12
    resize_on_border = true
}
group { col.border_active = $activeBorder; col.border_inactive = $inactiveBorder }
decoration {
    rounding = 0
    active_opacity = 0.90
    inactive_opacity = 0.80
    dim_inactive = true
    dim_strength = 0.2
    blur { enabled = true; size = 10; passes = 4; new_optimizations = true; ignore_opacity = true; contrast = 0.95; brightness = 0.92; vibrancy = 0.25; special = true; popups = true }
    shadow { enabled = true; range = 50; render_power = 4; color = rgba(3fc7ddaa) }
}
layerrule = blur, waybar
layerrule = blur, walker
layerrule = blur, notifications
layerrule = blur, swayosd
animations {
    enabled = true
    bezier = eog, 0.25, 0.46, 0.45, 0.94
    animation = windows, 1, 4, eog, popin 82%
    animation = border, 1, 8, eog
    animation = borderangle, 1, 18, linear, loop
    animation = fade, 1, 4.5, eog
    animation = workspaces, 1, 4.5, eog, slidefade 18%
}
